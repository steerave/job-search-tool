# ---- Required Keywords ------------------------------------
# Jobs must contain at least one of these in title or description.
# Leave empty [] to skip this filter.
required_keywords:
  # Delivery / program management signals
  - "delivery"
  - "program management"
  - "professional services"
  - "implementation"
  - "digital delivery"
  - "digital platform"
  - "technical delivery"
  - "product delivery"
  - "delivery production"
  # Technology / process signals
  - "digital transformation"
  - "agile"
  - "SDLC"
  - "engineering"
  - "release management"
  - "AI "
  - "software"
  # Leadership signals
  - "cross-functional"
  - "stakeholder"

# ---- Excluded Keywords ------------------------------------
# Jobs containing any of these are skipped entirely.
exclude_keywords:
  # Clearly off-target digital roles
  - "ecommerce director"
  - "e-commerce director"
  # Technical mismatches (role-specific — don't exclude "data science" as a domain phrase)
  - "machine learning engineer"
  - "data scientist"
  - "data engineer"
  - "hardware"
  - "COBOL"
  - "mainframe"
  # - "SAP"  # Removed — some SAP service delivery director roles are relevant
  # Seniority mismatches
  - "entry level"
  - "junior developer"
  - "junior engineer"
  - "internship"
  # Healthcare / medical (keep role-specific; avoid "clinical" which blocks health-tech SaaS delivery roles)
  - "pharmacist"
  - "nurse"
  - "physician"
  - "rehabilitation"
  - "therapist"
  - "patient"
  - "hospice"
  - "registered nurse"
  - "medical"
  - "health center"
  - "counseling services"
  - "home visiting"
  - "early childhood"
  - "head start"
  # Sales roles (avoid filtering "business development" as a phrase — it appears in delivery director JDs too)
  - "account executive"
  - "sales director"
  # Non-digital operations
  - "supply chain"
  - "construction"
  - "manufacturing"
  - "logistics"
  - "warehouse"
  - "maintenance technician"
  - "controls engineering"
  - "tunnel"
  - "transit"
  - "aviation"
  - "food service"
  - "produce manager"
  # Finance / mortgage / insurance
  - "mortgage"
  - "underwriting"
  - "actuary"
  - "pricing analyst"
  - "tax manager"
  - "tax director"
  # Education / non-profit (unrelated)
  - "special education"
  - "enrollment coordinator"
  - "school-based"
  - "early head start"
  # Other clearly unrelated
  - "automotive"
  - "real estate"
  - "apartment"
  # Industry / role type mismatches (added by feedback analyzer)
  # Note: "solutions delivery", "platform delivery", "AI delivery", "implementation services",
  # "delivery operations" were NOT added here — they conflict with active job title searches.
  - "pure PMO"
  - "portfolio strategy"
  - "POS systems"
  - "cybersecurity"
  - "healthcare"
  - "clinical"
  - "pharma"

# ---- Company Blacklist ------------------------------------
# Jobs from these companies are skipped.
exclude_companies: []
# Example:
# exclude_companies:
#   - "Staffing Company XYZ"
#   - "Some Company I Don't Like"

# ---- Fit Score Thresholds ---------------------------------
# Jobs below min_fit_score are NOT added to Google Sheets at all.
min_fit_score: 5

# ---- Pre-Scoring Title Filter ---------------------------
# Jobs whose title contains none of these words are skipped before Claude scoring.
# Catches off-target results from watchlist/local QC that bypass required_keywords.
title_domain_words:
  - "delivery"
  - "program"
  - "project"
  - "digital"
  - "technical"
  - "implementation"
  - "transformation"
  - "operations"
  - "product"
  - "producer"
  - "campaign"
  - "marketing"
  - "solutions"
  - "platform"
  - "strategy"

# ---- Scoring Cap -----------------------------------------
# Hard limit on jobs scored per run. If exceeded, a warning is logged
# and the list is truncated by insertion order (first-scraped jobs kept).
# Prevents runaway API costs on bad scrape days.
max_jobs_to_score: 150

# ---- National Remote Search Config -----------------------
national_remote:
  enabled: true
  # Country code for JobSpy
  country: "USA"
  # Job boards to search (options: linkedin, indeed, glassdoor, google, zip_recruiter)
  job_boards:
    - "linkedin"
    - "indeed"
    - "google"
    - "zip_recruiter"
  # Max results to fetch per title per board (before dedup + filtering)
  results_per_search: 40
  # Only include jobs posted within this many hours
  max_age_hours: 72  # 3 days — catches jobs posted Mon-Wed when running daily at 5am
  # Employment type filter (options: fulltime, parttime, contract, internship)
  employment_types:
    - "fulltime"

# ---- Local Quad Cities Search Config ---------------------
local_qc:
  enabled: true
  location: "Quad Cities, IA"
  radius_miles: 50
  country: "USA"
  job_boards:
    - "linkedin"
    - "indeed"
    - "google"
  results_per_search: 15
  max_age_hours: 168  # 7 days — local market is smaller, cast a wider net
  # Include hybrid and on-site roles (remote is filtered out separately)
  employment_types:
    - "fulltime"
  # After scraping, drop jobs whose location doesn't match any of these strings.
  # Case-insensitive substring match. Empty location is always kept.
  # Leave as [] to disable.
  location_include:
    - "davenport"
    - "bettendorf"
    - "moline"
    - "rock island"
    - "east moline"
    - "silvis"
    - "iowa city"
    - "muscatine"
    - "galesburg"
    - "quad cities"
    - "quad-cities"
    - ", ia"

# ---- ATS Watchlist Scan Config ---------------------------
# Companies are managed in the "Watchlist" tab of your Google Sheet.
# Add a company name to that tab and the tool auto-detects its ATS on the next run.
watchlist:
  enabled: true
  # Only fetch jobs posted/updated within this many days (avoids reprocessing old postings)
  lookback_days: 3
  # Number of parallel workers for scanning companies (ThreadPoolExecutor)
  scan_workers: 10
  # ATS probe order for unknown companies (first successful match wins)
  detection_order:
    - greenhouse
    - lever
    - ashby
    - smartrecruiters
    - recruitee
    - bamboohr

# ---- Salary Filter ----------------------------------------
# Uncomment and set to skip jobs below a minimum salary.
# min_salary: 120000

# ---- Deduplication ----------------------------------------
# How many days to remember seen jobs before pruning
seen_jobs_retention_days: 90

# ---- Output -----------------------------------------------
# Base directory for generated documents (relative to project root)
output_dir: "output"

# ---- Logging ----------------------------------------------
log_level: "INFO"
log_dir: "logs"
